# fly.toml — https://fly.io/docs/reference/configuration/
# Deploy with: fly launch (first time) or fly deploy

app = 'stpfoodblazor'
primary_region = 'ord'  # Chicago

[build]

[env]
  ASPNETCORE_ENVIRONMENT = "Production"

# Set secrets via CLI (not stored here):
#   fly secrets set APPCONFIG__HOLIDAYURL=https://...

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
